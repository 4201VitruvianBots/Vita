<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Vita — launch a browser-based VS Code workspace for the Vitruvian Bots project."
    />
    <title>Vita — VS Code in the browser</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="shell">
      <header>
        <p class="badge">Team 4201 · Vitruvian Bots</p>
        <h1>Vita</h1>
        <p class="lead">
          Open this project in VS Code from your browser—no install required. Choose a full cloud
          environment or a quick editor session.
        </p>
      </header>

      <section class="card" aria-labelledby="launch-heading">
        <h2 id="launch-heading">Get started</h2>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="launch" aria-busy="false">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M17.5 4.5c-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.85c0 .25.25.5.5.5.25 0 .5-.25.5-.5V6c0-1.1 3.6-2.5 5.5-2.5s5.5 1.4 5.5 2.5v11.5c0 .25.25.5.5.5s.5-.25.5-.5V6c1.55-1.1 3.55-1.5 5.5-1.5s5.5 1.4 5.5 2.5V19.5c0 .25.25.5.5.5s.5-.25.5-.5V6c-1.45-1.1-3.55-1.5-5.5-1.5z"
              />
            </svg>
            Launch VS Code
          </button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite">
          Click launch to open VS Code connected to this repository.
        </p>

        <div class="alt-actions">
          <button type="button" class="btn btn-secondary" id="quick-open">
            Quick edit (vscode.dev)
          </button>
          <button type="button" class="btn btn-secondary" id="codespace">
            Full environment (Codespaces)
          </button>
        </div>
      </section>

      <footer>
        <p>
          Hosted on
          <a href="https://pages.github.com/" rel="noopener noreferrer">GitHub Pages</a>
          · Source on
          <a id="repo-link" href="https://github.com/4201VitruvianBots/Vita" rel="noopener noreferrer"
            >GitHub</a
          >
        </p>
      </footer>
    </main>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
